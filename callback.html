<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connecting... | Grimm Trading Hub</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --border: rgba(255,255,255,0.08);
    --accent: #7c3aed;
    --accent2: #a855f7;
    --text: #f0eeff;
    --muted: #8b8ba8;
    --muted2: #5c5c7a;
    --green: #10b981;
    --red: #ef4444;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 440px;
    max-width: 95vw;
    text-align: center;
  }
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: .12em;
    margin-bottom: 36px;
  }
  .logo-hex {
    width: 28px; height: 28px;
    background: var(--accent);
    clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900; color: #fff;
  }
  .logo-underscore { color: var(--accent2); }
  .spinner {
    width: 52px; height: 52px;
    border: 3px solid rgba(124,58,237,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success-icon {
    width: 56px; height: 56px;
    background: rgba(16,185,129,0.15);
    border: 2px solid var(--green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 24px;
    color: var(--green);
  }
  .error-icon {
    width: 56px; height: 56px;
    background: rgba(239,68,68,0.15);
    border: 2px solid var(--red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 24px;
    color: var(--red);
  }
  h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
  p { font-size: 15px; color: var(--muted); line-height: 1.7; }
  .account-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(124,58,237,0.12);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 100px;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    margin: 8px 4px 0;
  }
  .pill-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
  }
  .progress-bar-wrap {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
    margin-top: 28px;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 100px;
    width: 0%;
    transition: width .3s ease;
  }
  .status-note {
    font-size: 12px;
    color: var(--muted2);
    margin-top: 14px;
  }
  .btn-retry {
    display: inline-block;
    margin-top: 20px;
    padding: 11px 26px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background .2s;
  }
  .btn-retry:hover { background: #6d28d9; }
</style>
</head>
<body>
<div class="box" id="box">
  <div class="logo">
    <div class="logo-hex">&#x2B21;</div>
    GRIMM<span class="logo-underscore">_</span>
  </div>

  <!-- LOADING -->
  <div id="state-loading">
    <div class="spinner"></div>
    <h2>Connecting your account&hellip;</h2>
    <p>Securely completing Deriv authorization.</p>
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog-load"></div></div>
    <p class="status-note" id="status-note">Verifying session&hellip;</p>
  </div>

  <!-- SUCCESS -->
  <div id="state-success" style="display:none;">
    <div class="success-icon">&#10003;</div>
    <h2>Account connected!</h2>
    <p>Your Deriv account is now linked to Grimm.</p>
    <div id="accounts-list"></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog-success" style="background:var(--green);"></div></div>
    <p class="status-note">Redirecting to dashboard&hellip;</p>
  </div>

  <!-- ERROR -->
  <div id="state-error" style="display:none;">
    <div class="error-icon">&#10005;</div>
    <h2>Connection failed</h2>
    <p id="error-msg">Something went wrong during authorization.</p>
    <a href="index.html" class="btn-retry">&#8592; Try Again</a>
  </div>
</div>

<script>
(async function() {
  const CLIENT_ID    = '33Dg2mvJU7l5aIjukYAvN';
  const REDIRECT_URI = 'https://dp2pusa-commits.github.io/kingsite/callback';
  const TOKEN_ENDPOINT = 'https://auth.deriv.com/oauth2/token';

  const params       = new URLSearchParams(window.location.search);
  const code         = params.get('code');
  const returnedState= params.get('state');
  const error        = params.get('error');
  const errorDesc    = params.get('error_description');

  // ── Animate loading bar ──
  const progLoad = document.getElementById('prog-load');
  const statusNote = document.getElementById('status-note');
  let w = 0;
  const tick = setInterval(() => {
    w = Math.min(w + Math.random() * 12, 80);
    progLoad.style.width = w + '%';
  }, 200);

  function stopLoad() { clearInterval(tick); progLoad.style.width = '100%'; }

  // ── Error from Deriv ──
  if (error) {
    stopLoad();
    setTimeout(() => showError(errorDesc || error), 400);
    return;
  }

  // ── No code in URL ──
  if (!code) {
    stopLoad();
    setTimeout(() => showError('No authorization code received. Please try logging in again.'), 400);
    return;
  }

  // ── Verify state (CSRF protection) ──
  const storedState    = sessionStorage.getItem('oauth_state');
  const codeVerifier   = sessionStorage.getItem('pkce_code_verifier');

  if (!storedState || storedState !== returnedState) {
    stopLoad();
    setTimeout(() => showError('Security check failed (state mismatch). Please try again.'), 400);
    return;
  }

  if (!codeVerifier) {
    stopLoad();
    setTimeout(() => showError('Session expired. Please log in again.'), 400);
    return;
  }

  statusNote.textContent = 'Exchanging authorization code\u2026';

  // ── Exchange code for access token ──
  try {
    const body = new URLSearchParams({
      grant_type:    'authorization_code',
      client_id:     CLIENT_ID,
      code:          code,
      code_verifier: codeVerifier,
      redirect_uri:  REDIRECT_URI
    });

    const res = await fetch(TOKEN_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body.toString()
    });

    const data = await res.json();

    if (!res.ok || !data.access_token) {
      throw new Error(data.error_description || data.error || 'Token exchange failed');
    }

    // Clean up PKCE values
    sessionStorage.removeItem('pkce_code_verifier');
    sessionStorage.removeItem('oauth_state');

    // Store token
    sessionStorage.setItem('deriv_access_token', data.access_token);
    sessionStorage.setItem('deriv_token_expiry', Date.now() + (data.expires_in * 1000));

    stopLoad();
    setTimeout(() => showSuccess([{ account: 'Deriv Account', currency: '' }]), 300);

  } catch (err) {
    stopLoad();
    setTimeout(() => showError(err.message || 'Token exchange failed. Please try again.'), 400);
  }

  function showSuccess(accounts) {
    document.getElementById('state-loading').style.display = 'none';
    document.getElementById('state-success').style.display = 'block';

    const list = document.getElementById('accounts-list');
    accounts.forEach(a => {
      const pill = document.createElement('span');
      pill.className = 'account-pill';
      pill.innerHTML = '<span class="pill-dot"></span>' + a.account + (a.currency ? ' &middot; ' + a.currency.toUpperCase() : '');
      list.appendChild(pill);
    });

    // Animate redirect bar then go to homepage
    const bar = document.getElementById('prog-success');
    let p = 0;
    const go = setInterval(() => {
      p += 2;
      bar.style.width = p + '%';
      if (p >= 100) {
        clearInterval(go);
        window.location.href = 'index.html?login=success';
      }
    }, 40);
  }

  function showError(msg) {
    document.getElementById('state-loading').style.display = 'none';
    document.getElementById('state-error').style.display = 'block';
    document.getElementById('error-msg').textContent = msg;
  }
})();
</script>
</body>
</html>
