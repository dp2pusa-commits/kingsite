<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>King Site — Logging in...</title>
  <style>
    body {
      margin: 0;
      background: #0A0A0F;
      color: #E8E8F0;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 16px;
    }
    .logo { font-size: 28px; color: #FFD700; letter-spacing: 4px; font-weight: 700; }
    .msg { color: #8888A0; font-size: 15px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,215,0,0.2);
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">♔ KING.SITE</div>
  <div class="spinner"></div>
  <div class="msg">Connecting your Deriv account...</div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token1 = params.get('token1');
    const acct1 = params.get('acct1');
    if (token1) {
      sessionStorage.setItem('deriv_token', token1);
      sessionStorage.setItem('deriv_account', acct1 || '');
      window.location.href = '/index.html?token1=' + token1 + '&acct1=' + (acct1 || '');
    } else {
      document.querySelector('.msg').textContent = 'Login failed. Redirecting...';
      setTimeout(() => window.location.href = '/index.html', 2000);
    }
  </script>
</body>
</html>
