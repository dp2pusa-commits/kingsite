<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logging in... | King Site</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0b0b0b;
    color: #d4af37;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
  }
  .box { text-align: center; max-width: 420px; padding: 24px; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(212,175,55,0.25);
    border-top-color: #d4af37;
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #e57373; }
  a.btn {
    display: inline-block; margin-top: 16px;
    padding: 10px 20px; border-radius: 6px;
    background: #d4af37; color: #111;
    text-decoration: none; font-weight: 600;
  }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <p id="status">Completing your login, please wait...</p>
</div>

<script>
const BACKEND_URL = 'https://kingsite-backend.onrender.com';

function showError(message) {
  document.getElementById('spinner').style.display = 'none';
  const statusEl = document.getElementById('status');
  statusEl.innerHTML =
    '<span class="error">' + message + '</span><br><a class="btn" href="/index.html">Back to Home</a>';
}

(async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const returnedState = params.get('state');
  const error = params.get('error');

  if (error) {
    showError('Login was cancelled or denied: ' + error);
    return;
  }

  if (!code) {
    showError('No authorization code received from Deriv. Please try logging in again.');
    return;
  }

  // State check: verify if possible, but don't hard-block login if storage
  // didn't survive the redirect (e.g. new tab, private browsing). We warn
  // instead of silently disabling the check.
  const savedState = sessionStorage.getItem('oauth_state');
  if (savedState && returnedState && savedState !== returnedState) {
    showError('Security check failed (state mismatch). Please start the login again from the homepage.');
    return;
  }
  if (!savedState) {
    console.warn('No saved oauth_state found in this browser session — skipping state verification. This can happen if the login was opened in a new tab.');
  }
  sessionStorage.removeItem('oauth_state');

  try {
    const response = await fetch(BACKEND_URL + '/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        code: code,
        redirect_uri: window.location.origin + window.location.pathname
      })
    });

    if (!response.ok) {
      const text = await response.text();
      throw new Error('Backend responded with ' + response.status + ': ' + text);
    }

    const data = await response.json();

    if (!data.access_token) {
      throw new Error('No access_token in backend response.');
    }

    localStorage.setItem('deriv_token', data.access_token);
    if (data.account) localStorage.setItem('deriv_account', data.account);

    document.getElementById('status').textContent = 'Login successful! Redirecting...';
    window.location.href = '/index.html';

  } catch (err) {
    console.error('Token exchange failed:', err);
    showError('Login failed while contacting the server. (' + err.message + ')');
  }
})();
</script>
</body>
</html>
