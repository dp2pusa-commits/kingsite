<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logging in... | King Site</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0A0A0F; color: #FFD700; font-family: 'Space Grotesk', -apple-system, sans-serif;
  }
  .box { text-align: center; max-width: 420px; padding: 24px; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(255,215,0,0.25); border-top-color: #FFD700;
    border-radius: 50%; margin: 0 auto 16px; animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #FF6B6B; }
  a.btn {
    display: inline-block; margin-top: 16px; padding: 10px 20px; border-radius: 6px;
    background: #FFD700; color: #0A0A0F; text-decoration: none; font-weight: 700;
  }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <p id="status">Completing your login, please wait...</p>
</div>

<script>
const BACKEND_URL = 'https://kingsite-backend.onrender.com';

function showError(message) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('status').innerHTML =
    '<span class="error">' + message + '</span><br><a class="btn" href="/index.html">Back to Home</a>';
}

(async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const returnedState = params.get('state');
  const error = params.get('error');
  const errorDescription = params.get('error_description');

  if (error) {
    showError('Login was cancelled or denied: ' + (errorDescription || error));
    return;
  }

  if (!code) {
    showError('No authorization code received from Deriv. Please try logging in again.');
    return;
  }

  const savedState = sessionStorage.getItem('oauth_state');
  const codeVerifier = sessionStorage.getItem('oauth_code_verifier');

  if (savedState && returnedState && savedState !== returnedState) {
    showError('Security check failed (state mismatch). Please start the login again from the homepage.');
    return;
  }

  if (!codeVerifier) {
    showError('Login session expired or was opened in a different tab. Please go back and click Login with Deriv again.');
    return;
  }

  try {
    const response = await fetch(BACKEND_URL + '/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        code: code,
        code_verifier: codeVerifier,
        redirect_uri: window.location.origin + window.location.pathname
      })
    });

    const data = await response.json();

    if (!response.ok || !data.access_token) {
      throw new Error(data.error || 'No access_token returned from backend.');
    }

    sessionStorage.removeItem('oauth_state');
    sessionStorage.removeItem('oauth_code_verifier');
    sessionStorage.setItem('deriv_token', data.access_token);
    if (data.account) sessionStorage.setItem('deriv_account', data.account);

    document.getElementById('status').textContent = 'Login successful! Redirecting...';
    window.location.href = '/index.html?token=' + encodeURIComponent(data.access_token);

  } catch (err) {
    console.error('Token exchange failed:', err);
    showError('Login failed while contacting the server. (' + err.message + ')');
  }
})();
</script>
</body>
</html>
