<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>King Site — Connecting...</title>
  <style>
    body { margin: 0; background: #0A0A0F; color: #E8E8F0; font-family: 'Space Grotesk', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
    .logo { font-size: 28px; color: #FFD700; letter-spacing: 4px; font-weight: 700; }
    .msg { color: #8888A0; font-size: 15px; text-align: center; max-width: 300px; line-height: 1.6; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,215,0,0.2); border-top-color: #FFD700; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-retry { margin-top: 8px; background: #FFD700; color: #0A0A0F; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div class="logo">♔ KING.SITE</div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Connecting your Deriv account...</div>

  <script>
    const BACKEND = 'https://kingsite-backend.onrender.com';

    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error');

      // Handle errors from Deriv
      if (error) {
        showError('Deriv returned an error: ' + error + '. Please try again.');
        return;
      }

      // Verify state to prevent CSRF
      const savedState = sessionStorage.getItem('oauth_state');
      if (!code || !state || state !== savedState) {
        showError('Invalid session. Please try logging in again.');
        return;
      }

      // Get code verifier saved during login
      const codeVerifier = sessionStorage.getItem('oauth_code_verifier');
      if (!codeVerifier) {
        showError('Session expired. Please try logging in again.');
        return;
      }

      try {
        document.getElementById('msg').textContent = 'Exchanging tokens with Deriv...';

        // Send code + verifier to our Render backend
        const response = await fetch(BACKEND + '/exchange', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, code_verifier: codeVerifier })
        });

        const data = await response.json();

        if (data.error) {
          showError('Login failed: ' + data.error);
          return;
        }

        // Save token and redirect to dashboard
        sessionStorage.setItem('deriv_token', data.access_token);
        sessionStorage.removeItem('oauth_state');
        sessionStorage.removeItem('oauth_code_verifier');

        document.getElementById('msg').textContent = 'Connected! Loading dashboard...';
        setTimeout(() => {
          window.location.href = 'index.html?token=' + encodeURIComponent(data.access_token);
        }, 800);

      } catch (err) {
        showError('Connection error. Please check your internet and try again.');
      }
    }

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').textContent = msg;
      const btn = document.createElement('button');
      btn.className = 'btn-retry';
      btn.textContent = 'Try Again';
      btn.onclick = () => window.location.href = 'index.html';
      document.body.appendChild(btn);
    }

    handleCallback();
  </script>
</body>
</html>
